<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nurse recruiters</title>
    <style>
      html {
        height: 100%;
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      section {
        height: 100vh;
        width: 100%;
      }

      recruiters-map {
        display: block;
        height: 100%;
        width: 100%;
      }

      .map-site-nav {
        position: fixed;
        bottom: 12px;
        right: 12px;
        z-index: 10000;
        display: flex;
        align-items: center;
        padding: 4px;
        background: rgba(255, 255, 255, 0.96);
        border-radius: 999px;
        box-shadow: 0 2px 14px rgba(0, 0, 0, 0.12);
        font:
          600 13px / 1.2 system-ui,
          -apple-system,
          sans-serif;
      }

      .map-site-nav a {
        padding: 8px 14px;
        border-radius: 999px;
        text-decoration: none;
        color: #374151;
        white-space: nowrap;
      }

      .map-site-nav a[aria-current='page'] {
        background: #195eb6;
        color: #fff;
      }

      .map-site-nav a:not([aria-current='page']):hover {
        background: #f3f4f6;
      }

      .map-site-nav a:not([aria-current='page']):focus-visible {
        outline: 2px solid #195eb6;
        outline-offset: 2px;
      }
    </style>
    <script type="module" crossorigin src="./assets/web-components.js"></script>
  </head>

  <body>
    <nav class="map-site-nav" aria-label="Choose map">
      <a href="./index.html">Jobs map</a>
      <a href="./recruiters.html" aria-current="page">Recruiter map</a>
    </nav>
    <section class="w-full h-screen overflow-hidden flex flex-col relative">
      <recruiters-map
        geojson-url="nurse-recruiters.geojson"
        mapbox-token="pk.eyJ1IjoiY2hyaXN0b3BoZXJjb3NuZXIiLCJhIjoiY21kZGFoaXdsMDJ1ajJubjMxdjRzZTBsMyJ9.d4fDFXYKjga4Hhc_60jaqw"
        mapbox-style="mapbox://styles/christophercosner/cmaznmgy800lu01rf1ql0bzmf"
      >
      </recruiters-map>
    </section>

  </body>
</html>
